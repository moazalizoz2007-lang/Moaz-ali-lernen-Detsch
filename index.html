<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق معاذ للألماني</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        .box { text-align: center; border: 3px solid #00d4ff; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        button { background: #00d4ff; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; }
        button:hover { background: #0099bb; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            return (
                <div className="box">
                    <h1>🇩🇪 تطبيق معاذ لتعلم الألماني 🇩🇪</h1>
                    <p style={{fontSize: '20px'}}>لو شايف الجملة دي، يبقى الموقع اشتغل بنسبة 100%!</p>
                    <button onClick={() => alert('Guten Tag! - نهارك سعيد')}>دوس هنا عشان تختبر الزرار</button>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
