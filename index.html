<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Trainer - Moaz</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; }
        input[type="range"] { accent-color: #00d4ff; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // الكلمات دي أنا حطيتها لك كمثال عشان الموقع ميبقاش فاضي
            const [input, setInput] = useState("lernen sprechen verstehen arbeiten gehen");
            const [words, setWords] = useState(["lernen", "sprechen", "verstehen", "arbeiten", "gehen"]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [autoPlay, setAutoPlay] = useState(false);
            const [repeatCount, setRepeatCount] = useState(2);
            const [quizWord, setQuizWord] = useState("");
            const [options, setOptions] = useState([]);
            const [score, setScore] = useState(0);

            const currentWord = words[currentIndex] || "Willkommen";

            // وظيفة النطق والتكرار
            const speakWord = (word) => {
                if (!word) return;
                speechSynthesis.cancel();
                for (let i = 0; i < repeatCount; i++) {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = "de-DE";
                    utterance.rate = 0.8;
                    speechSynthesis.speak(utterance);
                }
            };

            const loadWords = () => {
                const clean = input.split(/[\s\n]+/).filter(Boolean);
                setWords(clean);
                setCurrentIndex(0);
                if (clean.length > 0) speakWord(clean[0]);
            };

            const nextWord = () => {
                const next = (currentIndex + 1) % words.length;
                setCurrentIndex(next);
                speakWord(words[next]);
            };

            // إنشاء الكويز (الأسئلة)
            const createQuiz = () => {
                if (words.length < 2) return;
                const correct = words[Math.floor(Math.random() * words.length)];
                let choices = [...new Set([...words])].sort(() => 0.5 - Math.random()).slice(0, 4);
                if (!choices.includes(correct)) choices[0] = correct;
                setQuizWord(correct);
                setOptions(choices.sort(() => 0.5 - Math.random()));
            };

            useEffect(() => { if(words.length > 1) createQuiz(); }, [words, score]);

            return (
                <div className="min-h-screen bg-black text-white p-4 font-sans">
                    <div className="max-w-4xl mx-auto space-y-8">
                        <header className="text-center">
                            <h1 className="text-5xl font-black text-blue-500 mb-2">DEUTSCH TRAINER</h1>
                            <p className="text-gray-400">تعلم • استمع • تكرار • اختبار</p>
                        </header>

                        <div className="grid md:grid-cols-2 gap-6">
                            {/* منطقة إدخال الكلمات */}
                            <div className="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                                <h2 className="text-xl font-bold mb-4">قائمة الكلمات (اكتب هنا)</h2>
                                <textarea 
                                    className="w-full h-40 bg-black border border-zinc-700 rounded-xl p-4 text-blue-400 focus:outline-none"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                />
                                <button onClick={loadWords} className="w-full mt-4 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">تحميل الكلمات</button>
                            </div>

                            {/* منطقة النطق والتحكم */}
                            <div className="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 text-center">
                                <p className="text-zinc-500 mb-2">الكلمة الحالية</p>
                                <h2 className="text-6xl font-black mb-6 text-white">{currentWord}</h2>
                                <div className="flex justify-center gap-4 mb-6">
                                    <button onClick={() => speakWord(currentWord)} className="bg-white text-black px-8 py-3 rounded-full font-bold">🔊 نطق</button>
                                    <button onClick={nextWord} className="bg-zinc-700 px-8 py-3 rounded-full font-bold">التالي ➜</button>
                                </div>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-sm"><span>عدد التكرار: {repeatCount}</span></div>
                                    <input type="range" min="1" max="5" value={repeatCount} onChange={(e)=>setRepeatCount(e.target.value)} className="w-full" />
                                </div>
                            </div>
                        </div>

                        {/* قسم الكويز (الأسئلة) */}
                        <div className="bg-zinc-900 p-8 rounded-3xl border border-blue-900/30">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-blue-400">اختبر سمعك (Quiz)</h2>
                                <div className="bg-blue-600 px-4 py-1 rounded-lg font-bold text-xl">Score: {score}</div>
                            </div>
                            <div className="text-center mb-8">
                                <p className="text-zinc-400 mb-4">اسمع الكلمة واختار الإجابة الصح:</p>
                                <button onClick={() => speakWord(quizWord)} className="bg-white text-black p-4 rounded-2xl font-black scale-110 hover:scale-125 transition">🔊 اسمع الكلمة</button>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {options.map((opt, i) => (
                                    <button key={i} onClick={() => {
                                        if(opt === quizWord) { setScore(s=>s+1); alert("صح! Bravo ✅"); }
                                        else { alert("غلط! حاول تاني ❌"); }
                                    }} className="bg-zinc-800 border border-zinc-700 p-5 rounded-2xl hover:border-blue-500 transition text-xl font-bold">
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
