<!DOCTYPE html>
<html lang="de" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch mit Moaz Ali DKW</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f7f7f7; }
        .duo-btn { border-bottom: 4px solid #e5e5e5; transition: all 0.1s; }
        .duo-btn:active { border-bottom: none; transform: translateY(4px); }
        .btn-green { background-color: #58cc02; border-bottom: 4px solid #46a302; color: white; }
        .btn-green:hover { background-color: #61e002; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [input, setInput] = useState("");
            const [words, setWords] = useState([]);
            const [quiz, setQuiz] = useState(null);
            const [progress, setProgress] = useState(0);

            const speak = (text) => {
                speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'de-DE';
                msg.rate = 0.8;
                speechSynthesis.speak(msg);
            };

            const loadWords = () => {
                const lines = input.split('\n').filter(l => l.includes('-'));
                const newWords = lines.map(l => {
                    const [de, ar] = l.split('-').map(s => s.trim());
                    return { de, ar };
                });
                setWords(newWords);
                if(newWords.length >= 2) generateQuiz(newWords);
                else alert("يرجى إدخال كلمتين على الأقل (مثال: Hallo - مرحبا)");
            };

            const generateQuiz = (wordList) => {
                const correct = wordList[Math.floor(Math.random() * wordList.length)];
                let options = [correct.ar];
                const otherAr = wordList.filter(w => w.ar !== correct.ar).map(w => w.ar);
                
                // جلب خيارات عشوائية من كلماتك
                const shuffledOther = otherAr.sort(() => 0.5 - Math.random());
                options.push(...shuffledOther.slice(0, 3));

                setQuiz({ correct, options: options.sort(() => Math.random() - 0.5) });
                speak(correct.de);
            };

            const checkAnswer = (answer) => {
                if(answer === quiz.correct.ar) {
                    setProgress(p => Math.min(p + 20, 100));
                    alert("Richtig! أحسنت ✅");
                    generateQuiz(words);
                } else {
                    alert("Falsch! حاول مرة أخرى ❌");
                }
            };

            return (
                <div className="max-w-lg mx-auto p-4 py-8">
                    {/* Header الجديد بالاسم اللي طلبته */}
                    <header className="text-center mb-10">
                        <h1 className="text-3xl font-black text-[#58cc02] tracking-tight">
                            DEUTSCH MIT <br/> <span className="text-gray-800">MOAZ ALI DKW</span>
                        </h1>
                        <p className="text-gray-400 font-bold mt-2">Lerne Deutsch spielerisch!</p>
                    </header>
                    
                    {/* لوحة التحكم */}
                    <div className="bg-white p-6 rounded-3xl shadow-[0_8px_0_#e5e5e5] mb-10 border-2 border-gray-200">
                        <h2 className="text-sm font-bold text-gray-400 mb-3 text-right uppercase">أضف كلماتك (ألماني - عربي)</h2>
                        <textarea className="w-full h-32 p-4 bg-gray-50 rounded-2xl border-2 border-gray-100 outline-none focus:border-[#58cc02] transition-all text-left dir-ltr" 
                            placeholder="Hallo - مرحبا&#10;Haus - منزل"
                            value={input} onChange={(e) => setInput(e.target.value)} />
                        <button onClick={loadWords} className="w-full btn-green duo-btn font-black py-4 mt-4 rounded-2xl text-lg uppercase">
                            تحميل القاموس
                        </button>
                    </div>

                    {/* منطقة الاختبار (Duolingo Style) */}
                    {quiz ? (
                        <div className="bg-white p-8 rounded-3xl shadow-[0_8px_0_#e5e5e5] border-2 border-gray-200">
                            <div className="w-full h-4 bg-gray-100 rounded-full mb-10 overflow-hidden">
                                <div className="h-full bg-[#58cc02] transition-all duration-700" style={{width: `${progress}%`}}></div>
                            </div>
                            
                            <div className="flex flex-col items-center mb-10">
                                <button onClick={() => speak(quiz.correct.de)} className="bg-[#1cb0f6] w-20 h-20 rounded-2xl shadow-[0_5px_0_#1899d6] flex items-center justify-center text-white text-4xl hover:brightness-110 transition-all active:translate-y-1 active:shadow-none">
                                    🔊
                                </button>
                                <h3 className="text-4xl font-black text-gray-800 mt-6">{quiz.correct.de}</h3>
                            </div>

                            <div className="grid grid-cols-1 gap-3">
                                {quiz.options.map((opt, i) => (
                                    <button key={i} onClick={() => checkAnswer(opt)} 
                                        className="p-5 border-2 border-gray-200 rounded-2xl font-bold text-lg hover:bg-gray-50 hover:border-[#1cb0f6] duo-btn bg-white text-gray-600">
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="text-center py-10 opacity-30">
                           <span className="text-8xl">🇩🇪</span>
                           <p className="font-bold mt-4">أضف كلماتك لتبدأ التحدي</p>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
