<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم الألماني مع معاذ</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #121212; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 2px solid #00d4ff; text-align: center; width: 90%; max-width: 400px; }
        .word { font-size: 32px; color: #00d4ff; margin-bottom: 20px; }
        button { background: #00d4ff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; margin: 10px 0; transition: 0.3s; }
        button:hover { background: #0099bb; transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [index, setIndex] = React.useState(0);
            const words = [
                { de: "Guten Morgen", ar: "صباح الخير" },
                { de: "Wie geht es dir?", ar: "كيف حالك؟" },
                { de: "Ich lerne Deutsch", ar: "أنا أتعلم الألمانية" },
                { de: "Danke", ar: "شكراً" }
            ];

            return (
                <div className="container">
                    <h1>🇩🇪 تطبيق معاذ 🇩🇪</h1>
                    <div className="word">{words[index].de}</div>
                    <button onClick={() => alert(words[index].ar)}>كشف الترجمة</button>
                    <button onClick={() => setIndex((index + 1) % words.length)} style={{background: '#555'}}>الكلمة التالية</button>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
