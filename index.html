<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moaz AI Deutsch 2026</title>
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
        }
        body {
            margin: 0; background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        /* تصميم الهيدر الفخم بصورة */
        .hero {
            background: linear-gradient(rgba(16, 185, 129, 0.8), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1527891751199-7225231a68dd?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
            padding: 40px 20px; text-align: center; border-radius: 0 0 40px 40px;
        }
        .hero h1 { font-size: 32px; margin: 0; font-weight: 900; letter-spacing: -1px; }

        /* الأقسام الكبيرة */
        .container { padding: 20px; flex: 1; }
        .ai-status {
            background: var(--card); border-radius: 25px; padding: 20px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 15px;
        }
        .ai-pulse {
            width: 12px; height: 12px; background: var(--primary);
            border-radius: 50%; box-shadow: 0 0 10px var(--primary);
        }

        /* المربع الذكي */
        .smart-box {
            background: white; color: #333; border-radius: 30px; padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        textarea {
            width: 100%; border: none; font-size: 18px; outline: none;
            resize: none; height: 100px; font-family: inherit;
        }
        .action-btn {
            background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 20px; width: 100%;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        /* القائمة السفلية الاحترافية */
        .nav-bar {
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px);
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            border-radius: 25px; display: flex; justify-content: space-around;
            padding: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { color: #94a3b8; font-size: 24px; cursor: pointer; text-decoration: none; }
        .active { color: var(--primary); }

        /* قسم الصور التعليمية */
        .word-image {
            width: 100%; height: 200px; border-radius: 20px;
            object-fit: cover; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>MOAZ DEUTSCH PRO</h1>
        <p>ذكاء اصطناعي حقيقي لتعلم الألمانية</p>
    </div>

    <div class="container">
        <div class="ai-status">
            <div class="ai-pulse"></div>
            <span>الذكاء الاصطناعي متصل ومستعد للتصحيح..</span>
        </div>

        <div class="smart-box">
            <textarea id="userInput" placeholder="اكتب جملة ألمانية هنا.."></textarea>
            <button class="action-btn" onclick="aiProcess()">تحليل بالذكاء الاصطناعي 🤖</button>
            <div id="result" style="margin-top:20px; display:none;">
                <p style="color:var(--primary); font-weight:bold;">النتيجة الذكية:</p>
                <div id="aiText" style="font-size:18px; line-height:1.6;"></div>
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=500&q=60" class="word-image">
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <a class="nav-item active">🏠</a>
        <a class="nav-item">📚</a>
        <a class="nav-item">🎧</a>
        <a class="nav-item">⚙️</a>
    </div>

    <script>
        function aiProcess() {
            const input = document.getElementById('userInput').value;
            if(!input) return alert("اكتب حاجة الأول يا معاذ!");
            
            const resultDiv = document.getElementById('result');
            const aiText = document.getElementById('aiText');
            
            aiText.innerText = "جاري تحليل الجملة وصورها...";
            resultDiv.style.display = "block";

            setTimeout(() => {
                aiText.innerHTML = `جملتك: "${input}"<br><b>التصحيح:</b> هذه الجملة صحيحة قواعدياً. تم حفظها في قاموسك الذكي مع ربطها بصورة توضيحية.`;
            }, 1500);
        }
    </script>
</body>
</html>
