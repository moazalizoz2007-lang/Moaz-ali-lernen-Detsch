<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moaz Deutsch Pro | 1% Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }
        .glass-ui { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; }
        .nav-item { transition: 0.3s; filter: grayscale(1); }
        .nav-item.active { filter: grayscale(0); transform: translateY(-8px); background: #10b981; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4); }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-28">

    <!-- العدادات العلوية (Stats) -->
    <div class="p-6 flex justify-between items-center sticky top-0 bg-[#020617]/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-2 text-emerald-400 font-black italic text-2xl">MOAZ <span class="text-white">AI</span></div>
        <div class="bg-white/10 px-4 py-2 rounded-full text-orange-500 font-bold border border-orange-500/30">🔥 7 أيام</div>
    </div>

    <div id="main-content" class="max-w-2xl mx-auto p-4">
        
        <!-- صفحة 1: الرئيسية (الاحصائيات) -->
        <section id="page-home" class="page-content animate-fade-in">
            <h2 class="text-3xl font-black mb-6">لوحة التحكم 📊</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-ui p-6">
                    <p class="text-gray-400 text-sm">الكلمات المحفوظة</p>
                    <h3 id="wordCount" class="text-4xl font-bold">0</h3>
                </div>
                <div class="glass-ui p-6 border-l-4 border-blue-500">
                    <p class="text-gray-400 text-sm">مستوى الذكاء</p>
                    <h3 class="text-4xl font-bold">1%</h3>
                </div>
            </div>
        </section>

        <!-- صفحة 2: المعالج الذكي (إضافة وتحليل) -->
        <section id="page-add" class="page-content hidden">
            <h2 class="text-3xl font-black mb-6">المعالج الذكي 🤖</h2>
            <div class="glass-ui p-6">
                <textarea id="aiInput" class="w-full bg-white/5 p-4 rounded-2xl h-40 border border-white/10 outline-none focus:border-emerald-500 text-xl" placeholder="اكتب: الكلمة - الترجمة"></textarea>
                <button onclick="processAI()" class="w-full bg-emerald-500 text-slate-900 font-black py-4 rounded-2xl mt-4 text-lg">تحليل وحفظ بالذكاء الاصطناعي</button>
            </div>
            <div id="aiResult" class="mt-6 hidden glass-ui p-6 border-r-4 border-emerald-500">
                <p id="aiText" class="text-lg italic"></p>
                <img id="aiImg" class="w-full h-48 object-cover rounded-2xl mt-4 border-2 border-emerald-500/20" src="">
            </div>
        </section>

        <!-- صفحة 3: مختبر الصوت (الاستماع) -->
        <section id="page-audio" class="page-content hidden">
            <h2 class="text-3xl font-black mb-6">مختبر الصوت 🎧</h2>
            <div id="audioList" class="space-y-4">
                <!-- الكلمات هنا -->
            </div>
        </section>

        <!-- صفحة 4: الاختبار (الكويز) -->
        <section id="page-quiz" class="page-content hidden text-center">
            <h2 class="text-3xl font-black mb-6">تحدي الـ 1% 🏆</h2>
            <div id="quizContainer" class="glass-ui p-8 min-h-[300px]">
                <!-- كويز هنا -->
            </div>
        </section>

    </div>

    <!-- قائمة التنقل (Bottom Tabs) -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-[35px] p-2 flex justify-around shadow-2xl">
        <button onclick="showTab('home', this)" class="nav-item active p-4 rounded-2xl text-2xl">📊</button>
        <button onclick="showTab('add', this)" class="nav-item p-4 rounded-2xl text-2xl">➕</button>
        <button onclick="showTab('audio', this)" class="nav-item p-4 rounded-2xl text-2xl">🎧</button>
        <button onclick="showTab('quiz', this)" class="nav-item p-4 rounded-2xl text-2xl">🏆</button>
    </nav>

    <script>
        let myData = JSON.parse(localStorage.getItem('moaz_ultra_data')) || [];

        function showTab(id, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if(id === 'audio') renderAudio();
            if(id === 'quiz') startQuiz();
            updateStats();
        }

        function processAI() {
            const input = document.getElementById('aiInput').value;
            if(!input.includes('-')) return alert("اكتب الكلمة - الترجمة");
            
            let [de, ar] = input.split('-').map(s => s.trim());
            // تصحيح ألماني ذكي (Capitalization)
            de = de.charAt(0).toUpperCase() + de.slice(1);

            const res = document.getElementById('aiResult');
            res.classList.remove('hidden');
            document.getElementById('aiText').innerHTML = `تم تحليل الكلمة: <b class="text-emerald-400">${de}</b><br>المعنى المكتشف: ${ar}`;
            document.getElementById('aiImg').src = `https://picsum.photos/seed/${de}/600/400`;
            
            myData.push({de, ar, id: Date.now()});
            localStorage.setItem('moaz_ultra_data', JSON.stringify(myData));
            document.getElementById('aiInput').value = "";
            speak(de, 1);
        }

        function speak(text, times) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'de-DE';
            msg.rate = 0.8;
            for(let i=0; i<times; i++) window.speechSynthesis.speak(msg);
        }

        function renderAudio() {
            const list = document.getElementById('audioList');
            list.innerHTML = myData.length ? '' : '<p class="opacity-50 text-center">أضف كلمات أولاً!</p>';
            myData.forEach(w => {
                list.innerHTML += `
                    <div class="glass-ui p-4 flex justify-between items-center">
                        <div><p class="font-bold text-emerald-400 text-xl">${w.de}</p><p class="text-sm opacity-60">${w.ar}</p></div>
                        <div class="flex gap-2">
                            <button onclick="speak('${w.de}', 1)" class="bg-blue-500 p-3 rounded-xl">🔊</button>
                            <button onclick="speak('${w.de}', 3)" class="bg-emerald-500 p-3 rounded-xl text-xs font-bold">🔁 3x</button>
                        </div>
                    </div>`;
            });
        }

        function startQuiz() {
            const container = document.getElementById('quizContainer');
            if(myData.length < 2) return container.innerHTML = "تحتاج لكلمتين للبدء";
            const target = myData[Math.floor(Math.random() * myData.length)];
            container.innerHTML = `<h2 class="text-4xl font-black mb-8">${target.de}</h2>
                <div class="grid gap-4">
                    ${myData.slice(0, 3).map(w => `<button onclick="check('${w.ar}','${target.ar}')" class="glass-ui p-4 font-bold hover:bg-emerald-500 transition-all">${w.ar}</button>`).join('')}
                </div>`;
        }

        function check(s, c) {
            if(s === c) { alert("صح! ✅"); startQuiz(); } else alert("غلط! ❌");
        }

        function updateStats() { document.getElementById('wordCount').innerText = myData.length; }
        updateStats();
    </script>
</body>
</html>
