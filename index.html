<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch mit Moaz Ali DKW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    </style>
</head>
<body>

<div id="app" class="max-w-2xl mx-auto p-4">
    <!-- Header -->
    <div class="gradient-bg text-white p-6 rounded-3xl shadow-xl mb-6 text-center">
        <h1 class="text-3xl font-black">DEUTSCH MIT MOAZ</h1>
        <p class="font-bold opacity-90">ALI DKW - منصة التعلم الذكي</p>
    </div>

    <!-- Navigation -->
    <div class="grid grid-cols-3 gap-2 mb-6">
        <button onclick="showPage('add')" class="bg-white py-3 rounded-xl font-bold shadow-sm border border-gray-200">➕ إضافة</button>
        <button onclick="showPage('learn')" class="bg-white py-3 rounded-xl font-bold shadow-sm border border-gray-200">📖 ذاكر</button>
        <button onclick="showPage('quiz')" class="bg-white py-3 rounded-xl font-bold shadow-sm border border-gray-200">🏆 اختبار</button>
    </div>

    <!-- Pages -->
    <div id="content" class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 min-h-[300px]">
        <!-- المحتوى بيتغير هنا -->
    </div>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('myWords')) || [];

    function showPage(page) {
        const content = document.getElementById('content');
        if(page === 'add') {
            content.innerHTML = `
                <h2 class="text-xl font-bold mb-4">أضف كلماتك (كلمة - ترجمة)</h2>
                <textarea id="wordInput" class="w-full h-40 p-4 bg-gray-50 rounded-xl mb-4 border" placeholder="Hallo - مرحبا"></textarea>
                <button onclick="saveWords()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">حفظ الكلمات</button>
            `;
        } else if(page === 'learn') {
            content.innerHTML = words.length > 0 ? `<h2 class="text-center font-bold text-2xl">${words[0].de}</h2><p class="text-center text-gray-500">${words[0].ar}</p>` : "لا توجد كلمات!";
        } else {
            content.innerHTML = `<h2 class="text-center font-bold text-2xl">جاري تطوير الاختبار...</h2>`;
        }
    }

    function saveWords() {
        const input = document.getElementById('wordInput').value;
        const newWords = input.split('\n').map(l => {
            const [de, ar] = l.split('-');
            return { de: de.trim(), ar: ar.trim() };
        });
        localStorage.setItem('myWords', JSON.stringify(newWords));
        words = newWords;
        alert("تم الحفظ بنجاح!");
    }

    showPage('add'); // البداية
</script>

</body>
</html>
